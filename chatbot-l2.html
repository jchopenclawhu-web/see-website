<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 英語助教 L2 | 珊蒂美語 | Sandy’s Enlighten English</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Caveat:wght@400;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-brown: #857251;
            --accent-gold: #CEA964;
            --light-beige: #F7F4EE;
            --dark-text: #333;
            --white: #fff;
            --chat-bg: #EDE9DD;
            --user-bubble: #857251;
            --bot-bubble: #fff;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--light-beige);
            color: var(--dark-text);
            min-height: 100vh;
        }

        /* Background */
        .background-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('images/background.png');
            background-repeat: no-repeat;
            background-position: center top;
            background-size: 90%;
            z-index: -1;
            opacity: 0.15;
        }

        /* Nav */
        nav {
            background: rgba(255,255,255,0.95);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            position: sticky; top: 0; z-index: 100;
        }
        .nav-container {
            max-width: 900px; margin: 0 auto;
            padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo {
            font-family: 'Caveat', cursive;
            font-size: 1.5rem; font-weight: 700;
            color: var(--primary-brown);
        }
        .logo span { color: var(--accent-gold); }
        .nav-back {
            font-size: 0.9rem; color: var(--primary-brown);
            text-decoration: none; font-weight: 500;
            display: flex; align-items: center; gap: 0.3rem;
        }
        .nav-back:hover { color: var(--accent-gold); }

        /* Page header */
        .page-header {
            background: linear-gradient(135deg, var(--primary-brown), var(--accent-gold));
            color: white;
            padding: 2.5rem 2rem;
            text-align: center;
        }
        .page-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem; margin-bottom: 0.5rem;
        }
        .page-header p { opacity: 0.9; font-size: 1rem; }

        /* Settings bar */
        .settings-bar {
            max-width: 900px; margin: 1.5rem auto 0;
            padding: 0 2rem;
            display: flex; flex-wrap: wrap; gap: 1rem;
            align-items: center;
        }
        .setting-group {
            display: flex; align-items: center; gap: 0.5rem;
            font-size: 0.85rem;
        }
        .setting-group label { font-weight: 500; color: var(--primary-brown); }
        select, button.setting-btn {
            padding: 0.4rem 0.8rem;
            border: 1.5px solid var(--primary-brown);
            border-radius: 20px;
            background: white;
            font-size: 0.85rem;
            cursor: pointer;
            color: var(--dark-text);
            transition: all 0.2s;
        }
        select:hover, button.setting-btn:hover {
            background: var(--primary-brown);
            color: white;
        }
        button.setting-btn.active {
            background: var(--accent-gold);
            border-color: var(--accent-gold);
            color: white;
        }

        /* Chat container */
        .chat-wrapper {
            max-width: 900px; margin: 1.5rem auto;
            padding: 0 2rem 2rem;
        }
        .chat-container {
            background: white;
            border-radius: 20px;
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 65vh;
            min-height: 450px;
        }

        /* Messages area */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: var(--chat-bg);
        }
        .message {
            max-width: 75%;
            padding: 0.8rem 1.2rem;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 0.95rem;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            align-self: flex-end;
            background: var(--user-bubble);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.bot {
            align-self: flex-start;
            background: var(--bot-bubble);
            color: var(--dark-text);
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        .message.bot .bot-name {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--accent-gold);
            margin-bottom: 0.3rem;
        }
        .message.system {
            align-self: center;
            background: transparent;
            color: #999;
            font-size: 0.8rem;
            text-align: center;
            box-shadow: none;
        }
        .message .example-hint {
            font-size: 0.8rem;
            color: #888;
            margin-top: 0.5rem;
            font-style: italic;
        }

        /* Input area */
        .input-area {
            padding: 1rem 1.5rem;
            background: white;
            border-top: 1px solid rgba(0,0,0,0.08);
            display: flex;
            gap: 0.8rem;
            align-items: flex-end;
        }
        .input-area textarea {
            flex: 1;
            border: 2px solid #e0dbd3;
            border-radius: 25px;
            padding: 0.75rem 1.2rem;
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 0.95rem;
            resize: none;
            outline: none;
            min-height: 48px;
            max-height: 120px;
            line-height: 1.5;
            transition: border-color 0.2s;
        }
        .input-area textarea:focus {
            border-color: var(--accent-gold);
        }
        .send-btn {
            width: 48px; height: 48px;
            border-radius: 50%;
            border: none;
            background: var(--accent-gold);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s, transform 0.1s;
            flex-shrink: 0;
        }
        .send-btn:hover { background: var(--primary-brown); }
        .send-btn:active { transform: scale(0.95); }
        .send-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* Typing indicator */
        .typing {
            display: flex; gap: 4px; align-items: center;
            padding: 0.8rem 1.2rem;
        }
        .typing-dot {
            width: 8px; height: 8px;
            background: var(--accent-gold);
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-6px); }
        }

        /* Example questions */
        .examples {
            padding: 0.8rem 1.5rem;
            background: white;
            border-top: 1px solid rgba(0,0,0,0.05);
            display: flex; flex-wrap: wrap; gap: 0.5rem;
        }
        .examples-label {
            font-size: 0.75rem; color: #999;
            width: 100%; margin-bottom: 0.2rem;
        }
        .example-btn {
            background: var(--light-beige);
            border: 1px solid #d4cfc6;
            border-radius: 20px;
            padding: 0.3rem 0.9rem;
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--primary-brown);
            transition: all 0.2s;
        }
        .example-btn:hover {
            background: var(--accent-gold);
            color: white;
            border-color: var(--accent-gold);
        }

        /* Status */
        .status-bar {
            text-align: center;
            padding: 0.5rem;
            font-size: 0.75rem;
            color: #aaa;
            background: var(--light-beige);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .page-header h1 { font-size: 1.5rem; }
            .chat-wrapper { padding: 0 1rem 1rem; }
            .message { max-width: 88%; }
            .settings-bar { padding: 0 1rem; }
        }
    </style>
</head>
<body>
    <div class="background-layer"></div>

    <!-- Navigation -->
    <nav>
        <div class="nav-container">
            <div class="logo">珊蒂美語 <span>S.E.E</span></div>
            <a href="index.html" class="nav-back">← 回到首頁</a>
        </div>
    </nav>

    <!-- Header -->
    <div class="page-header">
        <h1>🤖 AI 英語助教</h1>
        <p>Level 2 — Stone Fox · Grammar · Vocabulary</p>
    </div>

    <!-- Settings -->
    <div class="settings-bar">
        <div class="setting-group">
            <label>角色:</label>
            <select id="personality">
                <option value="leo">🦁 Leo (鼓勵型)</option>
                <option value="cosmo">🚀 Cosmo (探险型)</option>
                <option value="winston">✨ Winston (学者型)</option>
                <option value="pixel">🎨 Pixel (艺术型)</option>
                <option value="champ">💪 Champ (教练型)</option>
                <option value="sakura">🌸 Sakura (温柔型)</option>
                <option value="bot3000">🤖 Bot-3000 (机器人型)</option>
            </select>
        </div>
        <div class="setting-group">
            <label>翻譯:</label>
            <select id="translation">
                <option value="1">🌐 全中文</option>
                <option value="2" selected>💡 單字提示</option>
                <option value="3">📖 按需翻譯</option>
                <option value="4">🇬🇧 全英語</option>
            </select>
        </div>
    </div>

    <!-- Chat -->
    <div class="chat-wrapper">
        <div class="chat-container">
            <div class="messages" id="messages">
                <div class="message bot">
                    <div class="bot-name" id="bot-name">Leo</div>
                    Roar! 🦁 Great to see you! I'm Leo, and I'm here to help you learn English! Type a question or try one below!
                </div>
            </div>

            <!-- Example questions -->
            <div class="examples">
                <div class="examples-label">試試看 / Try these:</div>
                <button class="example-btn" data-q="What does adventure mean?">冒險 adventure 是什麼？</button>
                <button class="example-btn" data-q="How do I use 'however' in a sentence?">however 怎麼用？</button>
                <button class="example-btn" data-q="Tell me about the book Stone Fox">Stone Fox 故事在說什麼？</button>
                <button class="example-btn" data-q="Make a sentence with 'determined'">determined 造句</button>
                <button class="example-btn" data-q="What is the past tense of run?">run 的過去式是什麼？</button>
            </div>

            <!-- Input -->
            <div class="input-area">
                <textarea
                    id="user-input"
                    placeholder="問我任何關於英文單字、文法、Stone Fox 的問題..."
                    rows="1"
                ></textarea>
                <button class="send-btn" id="send-btn" title="發送">➤</button>
            </div>
        </div>
    </div>

    <div class="status-bar" id="status">就緒 · Ready</div>

    <script>
        // ============================================================
        // CONFIG — change API_URL to your deployed API address
        // ============================================================
        const API_URL = 'https://intend-outcomes-resist-edwards.trycloudflare.com';
        // ============================================================

        const personalities = {
            leo:     { name: 'Leo 🦁',     greeting: "Roar! 🦁 Great to see you! I'm Leo, and I'm here to help you learn English!" },
            cosmo:   { name: 'Cosmo 🚀',   greeting: "🚀 Welcome aboard, space explorer! I'm Captain Cosmo! Let's explore English together!" },
            winston: { name: 'Winston ✨', greeting: "Ah, young scholar! ✨ I am Wizard Winston. What knowledge do you seek today?" },
            pixel:   { name: 'Pixel 🎨',   greeting: "🎨 Hi there! I'm Pixel! Let's paint pictures with words today!" },
            champ:   { name: 'Champ 💪',   greeting: "💪 Hey champion! Coach Champ here! Let's train our English muscles!" },
            sakura:  { name: 'Sakura 🌸', greeting: "🌸 Hi sweetie! I'm Sakura. Let's learn English in a gentle, peaceful way." },
            bot3000: { name: 'Bot-3000 🤖', greeting: "🤖 GREETINGS STUDENT. I am Bot-3000. My circuits are ready to teach you ENGLISH." },
        };

        const personalitySelect = document.getElementById('personality');
        const translationSelect = document.getElementById('translation');
        const messagesEl = document.getElementById('messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const statusEl = document.getElementById('status');
        const botNameEl = document.getElementById('bot-name');

        let history = [];
        let currentPersonality = 'leo';
        let isLoading = false;

        // Auto-resize textarea
        userInput.addEventListener('input', () => {
            userInput.style.height = 'auto';
            userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
        });

        // Personality change
        personalitySelect.addEventListener('change', () => {
            currentPersonality = personalitySelect.value;
            const p = personalities[currentPersonality];
            botNameEl.textContent = p.name;
        });

        // Example buttons
        document.querySelectorAll('.example-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const q = btn.dataset.q;
                userInput.value = q;
                handleSend();
            });
        });

        // Send on Enter (Shift+Enter for newline)
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        sendBtn.addEventListener('click', handleSend);

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text || isLoading) return;

            // Add user message
            addMessage('user', text);
            history.push({ role: 'user', content: text });
            userInput.value = '';
            userInput.style.height = 'auto';

            // Show typing indicator
            showTyping();
            isLoading = true;
            sendBtn.disabled = true;
            statusEl.textContent = '思考中... Thinking...';

            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: text,
                        level: 'l2',
                        personality: currentPersonality,
                        translation_level: translationSelect.value,
                        history: history.slice(-10),  // last 10 turns
                    }),
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();
                hideTyping();

                const answer = data.answer || "I'm not sure how to answer that. Can you try asking differently?";
                addMessage('bot', answer);
                history.push({ role: 'assistant', content: answer });

                statusEl.textContent = `回覆時間 Response: ${data.latency_ms}ms · 角色 Personality: ${currentPersonality}`;

            } catch (err) {
                hideTyping();
                addMessage('bot', `哎呀！發生錯誤了 😣\n\n${err.message}\n\n請稍後再試，或聯絡老師。`);
                statusEl.textContent = '錯誤 · Error';
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
            }
        }

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            if (role === 'bot') {
                div.innerHTML = `<div class="bot-name">${botNameEl.textContent}</div>${escapeHtml(text)}`;
            } else {
                div.textContent = text;
            }
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'message bot';
            div.id = 'typing-indicator';
            div.innerHTML = `<div class="bot-name">${botNameEl.textContent}</div><div class="typing"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>`;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function hideTyping() {
            const el = document.getElementById('typing-indicator');
            if (el) el.remove();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>

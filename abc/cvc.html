<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FFC107">
  <title>CVC Words — 珊蒂美語</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="cvc.css">
</head>
<body>
  <main class="container">
    <header class="hero">
      <h1 id="pageTitle" data-touch-gesture="true">CVC Words</h1>
      <p class="subtitle">珊蒂美語 · <span id="levelLabel">Pre-K</span> · <span id="weekLabel">Week 1 of 25</span></p>
    </header>

    <section class="card player-card" aria-label="Family intro audio">
      <div class="player-header">
        <span class="badge" id="familyBadge">-at family</span>
        <h2 id="familyTitle">Short a · -at</h2>
        <p class="player-hint" id="playerHint">Tap play to hear this week's words</p>
      </div>

      <div class="player-body">
        <button id="playBtn" class="play-btn" type="button" aria-label="Play">
          <span class="play-icon" id="playIcon">▶</span>
        </button>
        <div class="progress-area">
          <div class="progress-row">
            <span class="time" id="timeCurrent">0:00</span>
            <span class="time" id="timeTotal">0:00</span>
          </div>
          <div class="progress-track" id="progressTrack" role="slider" aria-label="Seek" tabindex="0">
            <div class="progress-fill" id="progressFill"></div>
            <div class="progress-handle" id="progressHandle"></div>
          </div>
        </div>
      </div>

      <div class="player-actions">
        <button id="prevBtn" class="ghost-btn" type="button">← Previous</button>
        <button id="nextBtn" class="ghost-btn" type="button">Next →</button>
      </div>

      <audio id="audio" preload="metadata"></audio>
    </section>

    <section class="card words-card" aria-label="This week's words">
      <h2>This Week's Words</h2>
      <p class="section-hint">Read along, then tap a word to see it bigger</p>
      <div class="word-grid" id="wordGrid"></div>
    </section>

    <div class="big-word-overlay" id="bigWordOverlay" aria-hidden="true">
      <div class="big-word" id="bigWord"></div>
      <div class="big-word-hint">tap anywhere to close</div>
    </div>

    <footer class="foot">
      <p>CVC Practice · v0.1</p>
    </footer>
  </main>

  <!-- Teacher panel: hidden by default, shown on 3-finger tap -->
  <div class="teacher-panel" id="teacherPanel" aria-hidden="true">
    <div class="teacher-card">
      <h2>Teacher Settings</h2>
      <p class="teacher-hint">Set the level and which weeks are unlocked</p>

      <label class="field">
        <span>Level</span>
        <select id="levelSelect">
          <option value="prek">Pre-K (progressive)</option>
          <option value="l1">Level 1 (all weeks)</option>
          <option value="l2">Level 2 (all weeks)</option>
        </select>
      </label>

      <label class="field" id="maxPagesField">
        <span>Max week (1-25): <strong id="maxPagesValue">1</strong></span>
        <input type="range" id="maxPagesRange" min="1" max="25" value="1">
      </label>

      <div class="teacher-actions">
        <button id="teacherSave" class="ghost-btn">Save</button>
        <button id="teacherClose" class="ghost-btn">Close</button>
      </div>
    </div>
  </div>

  <!-- PIN dialog -->
  <div class="pin-dialog" id="pinDialog" aria-hidden="true">
    <div class="pin-card">
      <h3>Enter PIN</h3>
      <input type="password" id="pinInput" maxlength="4" inputmode="numeric" pattern="[0-9]*" placeholder="••••">
      <p class="pin-error" id="pinError"></p>
      <div class="pin-actions">
        <button id="pinSubmit" class="ghost-btn">OK</button>
        <button id="pinCancel" class="ghost-btn">Cancel</button>
      </div>
    </div>
  </div>

  <script src="cvc.js?v=2"></script>
</body>
</html>
